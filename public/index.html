<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Assassin Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    body { background: #0a0a0a; color: white; font-family: system-ui; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
    .log-row { transition: all 0.2s; }
    .live-dot {
      animation: pulse 2s infinite;
    }
  </style>
</head>
<body class="min-h-screen pb-20">

  <div class="max-w-xl mx-auto p-4">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6 pt-2">
      <div class="flex items-center gap-3">
        <div class="text-3xl">👁️</div>
        <div>
          <h1 class="text-2xl font-bold text-cyan-400">ASSASSIN MONITOR</h1>
          <p class="text-zinc-500 text-sm">Live Username Checker</p>
        </div>
      </div>
      <div id="user-id-display" class="text-xs bg-zinc-900 px-3 py-1 rounded-full font-mono"></div>
    </div>

    <!-- Login -->
    <div id="login-screen">
      <div class="glass rounded-3xl p-8">
        <div class="text-center mb-6">
          <div class="text-5xl mb-4">🔥</div>
          <h2 class="text-xl font-semibold">Enter Your User ID</h2>
        </div>
        <input id="user-id-input" type="text" placeholder="7968968395" 
               class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-5 text-lg text-center font-mono focus:outline-none focus:border-cyan-500"/>
        <button onclick="login()" 
                class="w-full mt-6 bg-cyan-600 hover:bg-cyan-500 py-5 rounded-2xl font-bold text-lg">
          LOGIN TO MONITOR
        </button>
      </div>
    </div>

    <!-- Main Monitor -->
    <div id="main-screen" class="hidden">
      <div class="glass rounded-3xl p-6 mb-6">
        <div class="flex gap-3">
          <input id="monitor-username" type="text" placeholder="Enter username (without @)" 
                 class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-5 text-lg focus:outline-none focus:border-cyan-500"/>
          <button onclick="startMonitoring()" 
                  class="bg-cyan-600 hover:bg-cyan-500 px-10 rounded-2xl font-bold">
            START
          </button>
        </div>
      </div>

      <!-- Status -->
      <div id="status" class="hidden glass rounded-3xl p-5 mb-6 text-center">
        <div class="flex items-center justify-center gap-3 text-green-400">
          <span class="relative flex h-4 w-4">
            <span class="live-dot absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-4 w-4 bg-green-500"></span>
          </span>
          <span class="font-bold" id="current-username"></span>
          <span class="text-sm text-zinc-400">is being monitored</span>
        </div>
      </div>

      <!-- Logs -->
      <div class="glass rounded-3xl p-5 h-[520px] overflow-auto font-mono text-sm" id="monitor-logs">
        <div class="text-zinc-500 text-center py-10">
          Monitoring logs will appear here...
        </div>
      </div>

      <div class="flex gap-3 mt-6">
        <button onclick="stopMonitoring()" 
                class="flex-1 bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-bold">
          STOP MONITORING
        </button>
        <button onclick="logout()" 
                class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl font-bold">
          LOGOUT
        </button>
      </div>
    </div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    let currentUserId = null;
    let monitorInterval = null;
    let monitorCount = 0;

    // Telegram Mini App Setup
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    async function login() {
      let inputId = document.getElementById('user-id-input').value.trim().toUpperCase();
      if (!inputId) return alert("Enter User ID");

      const resp = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ userId: inputId })
      });
      const data = await resp.json();

      if (!data.success) {
        return alert("❌ Invalid User ID");
      }

      currentUserId = inputId;
      localStorage.setItem('monitorUser', currentUserId);

      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('main-screen').classList.remove('hidden');
      document.getElementById('user-id-display').textContent = currentUserId;
    }

    async function startMonitoring() {
      let username = document.getElementById('monitor-username').value.trim().replace('@','').toLowerCase();
      if (!username) return alert("Enter username");

      const status = document.getElementById('status');
      const logs = document.getElementById('monitor-logs');

      status.classList.remove('hidden');
      document.getElementById('current-username').textContent = `@${username}`;
      logs.innerHTML = `<div class="text-cyan-400 text-center py-4">🔍 Started monitoring @${username}</div>`;

      monitorCount = 0;
      if (monitorInterval) clearInterval(monitorInterval);

      monitorInterval = setInterval(async () => {
        monitorCount++;
        const time = new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

        const log = document.createElement('div');
        log.className = "log-row flex justify-between py-3 border-b border-zinc-800 last:border-none text-xs";
        log.innerHTML = `
          <span class="text-zinc-500">#${monitorCount}</span>
          <span class="text-zinc-400">${time}</span>
          <span class="text-green-400 font-bold">ACTIVE</span>
          <span class="text-white">@${username}</span>
        `;
        logs.appendChild(log);
        logs.scrollTop = logs.scrollHeight;

        // Optional: Real check every 10 seconds
        if (monitorCount % 4 === 0) {
          try {
            const resp = await fetch('/check-username', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({username})
            });
            const data = await resp.json();
            if (!data.exists) {
              const alertLog = document.createElement('div');
              alertLog.className = "bg-red-500/20 border border-red-500 p-3 rounded-2xl text-red-400 text-center my-4";
              alertLog.textContent = `⚠️ @${username} might be banned!`;
              logs.appendChild(alertLog);
            }
          } catch(e){}
        }
      }, 1800); // Fast monitoring
    }

    function stopMonitoring() {
      if (monitorInterval) clearInterval(monitorInterval);
      document.getElementById('status').classList.add('hidden');
      alert("Monitoring Stopped");
    }

    function logout() {
      if (confirm("Logout?")) {
        localStorage.removeItem('monitorUser');
        location.reload();
      }
    }

    // Auto Login
    window.onload = () => {
      const saved = localStorage.getItem('monitorUser');
      if (saved) {
        currentUserId = saved;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        document.getElementById('user-id-display').textContent = currentUserId;
      }
    };
  </script>
</body>
</html>
