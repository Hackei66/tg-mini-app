<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Assassin Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { background: #0a0a0a; color: white; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    .profile-img { border: 4px solid #22d3ee; }
  </style>
</head>
<body class="min-h-screen">

<div class="max-w-2xl mx-auto p-4">

  <div class="flex justify-between items-center mb-6">
    <div class="flex items-center gap-3">
      <span class="text-4xl">👁️</span>
      <div>
        <h1 class="text-2xl font-bold text-cyan-400">PAID ASSASSIN</h1>
        <p class="text-zinc-500">MONITOR BOT</p>
      </div>
    </div>
    <div id="user-info" class="font-mono text-xs bg-zinc-900 px-3 py-1 rounded-full"></div>
  </div>

  <!-- LOGIN -->
  <div id="login-screen" class="glass rounded-3xl p-8">
    <div class="text-center mb-8">
      <div class="text-6xl mb-4">🔥</div>
      <h2 class="text-xl font-semibold">Secure Login</h2>
    </div>
    <input id="user-id-input" type="text" placeholder="Enter User ID" 
           class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-5 text-center text-lg font-mono"/>
    <button onclick="login()" class="w-full mt-6 bg-cyan-600 hover:bg-cyan-500 py-5 rounded-2xl font-bold text-lg">
      LOGIN
    </button>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="hidden">

    <div id="admin-nav" class="hidden mb-4">
      <button onclick="showAdminPanel()" class="bg-red-600 hover:bg-red-700 w-full py-3 rounded-2xl font-bold">👑 MANAGE USERS</button>
    </div>

    <div class="glass rounded-3xl p-6">
      <div class="flex gap-3">
        <input id="monitor-username" type="text" placeholder="username without @" 
               class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-5 focus:outline-none focus:border-cyan-500"/>
        <button onclick="checkProfile()" class="bg-cyan-600 hover:bg-cyan-500 px-8 rounded-2xl font-bold">CHECK</button>
      </div>
    </div>

    <!-- Profile + Screenshot -->
    <div id="profile-card" class="hidden mt-6 glass rounded-3xl p-6">
      <div class="text-center">
        <h3 id="profile-username" class="text-2xl font-bold"></h3>
        <div id="status-badge" class="inline-block mt-3 px-6 py-2 rounded-full text-sm font-bold"></div>
      </div>

      <div class="mt-8">
        <button onclick="takeFullScreenshot()" 
                class="w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
          📸 TAKE FULL PROFILE SCREENSHOT
        </button>
      </div>

      <div id="screenshot-result" class="hidden mt-6">
        <p class="text-cyan-400 mb-3">Full Profile Screenshot:</p>
        <img id="full-screenshot" class="w-full rounded-2xl border border-zinc-700" src="" alt="">
      </div>
    </div>

    <button onclick="logout()" class="mt-8 w-full bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl font-bold">LOGOUT</button>
  </div>
</div>

<script>
const ADMIN_ID = "7968968395";

let currentUserId = null;

Telegram.WebApp.ready();
Telegram.WebApp.expand();

async function login() {
  let id = document.getElementById('user-id-input').value.trim().toUpperCase();
  if (!id) return alert("Enter User ID");

  const res = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({userId: id})
  });
  const data = await res.json();

  if (!data.success) return alert("❌ Invalid User ID");

  currentUserId = id;
  localStorage.setItem('monitorUser', id);
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  document.getElementById('user-info').textContent = `● ${id}`;

  if (id === ADMIN_ID) document.getElementById('admin-nav').classList.remove('hidden');
}

async function checkProfile() {
  let username = document.getElementById('monitor-username').value.trim().replace('@','').toLowerCase();
  if (!username) return alert("Enter username");

  document.getElementById('profile-card').classList.remove('hidden');
  document.getElementById('screenshot-result').classList.add('hidden');

  try {
    const res = await fetch('/check-username', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username})
    });
    const data = await res.json();

    document.getElementById('profile-username').textContent = `@${username}`;
    
    if (data.exists) {
      document.getElementById('status-badge').innerHTML = `✅ ACCOUNT ACTIVE`;
      document.getElementById('status-badge').className = `bg-green-500/20 text-green-400 px-6 py-2 rounded-full`;
    } else {
      document.getElementById('status-badge').innerHTML = `❌ NOT FOUND / BANNED`;
      document.getElementById('status-badge').className = `bg-red-500/20 text-red-400 px-6 py-2 rounded-full`;
    }
  } catch(e) {}
}

async function takeFullScreenshot() {
  const username = document.getElementById('monitor-username').value.trim().replace('@','').toLowerCase();
  if (!username) return;

  const btn = event.target;
  const originalText = btn.innerHTML;
  btn.innerHTML = '⏳ TAKING SCREENSHOT...';
  btn.disabled = true;

  try {
    const res = await fetch('/screenshot', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username})
    });
    const data = await res.json();

    if (data.success) {
      document.getElementById('full-screenshot').src = data.imageUrl;
      document.getElementById('screenshot-result').classList.remove('hidden');
    } else {
      alert("Screenshot failed");
    }
  } catch(e) {
    alert("Error");
  }

  btn.innerHTML = originalText;
  btn.disabled = false;
}

function logout() {
  if (confirm("Logout?")) {
    localStorage.removeItem('monitorUser');
    location.reload();
  }
}

// Auto Login
window.onload = () => {
  const saved = localStorage.getItem('monitorUser');
  if (saved) {
    currentUserId = saved;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    document.getElementById('user-info').textContent = `● ${saved}`;
    if (saved === ADMIN_ID) document.getElementById('admin-nav').classList.remove('hidden');
  }
};
</script>
</body>
</html>
